name: smart-traffic-controller
version: "1.0.0"
description: >
  A real-world traffic light control environment where an AI agent
  manages a 4-way intersection to minimize vehicle wait times.

environment:
  type: traffic
  max_steps: 100
  observation_space:
    lanes:
      type: array
      items: integer
      length: 4
    total_wait:
      type: integer
    message:
      type: string
  action_space:
    lane:
      type: integer
      min: 0
      max: 3

tasks:
  - id: task1_easy
    description: Keep total waiting cars under 20 for 50 steps
    difficulty: easy
    max_steps: 50
  - id: task2_medium
    description: Keep average wait under 5 cars per step across 100 steps
    difficulty: medium
    max_steps: 100
  - id: task3_hard
    description: Keep all lanes under 10 cars for entire episode
    difficulty: hard
    max_steps: 100

server:
  port: 7860
  framework: fastapi